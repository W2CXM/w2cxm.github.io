services:
  jekyll:
    image: ruby:3.2-slim
    working_dir: /srv/jekyll
    command: >
      bash -c "apt-get update -qq &&
               apt-get install -y --no-install-recommends build-essential libssl-dev &&
               bundle install &&
               bundle exec jekyll serve --host 0.0.0.0 --watch --force_polling --drafts"
    ports:
      - "4000:4000"
    volumes:
      - ./docs:/srv/jekyll
      - jekyll_bundle:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development

volumes:
  jekyll_bundle:
